version: "3"

services:
  prom-server:
    image: prom/prometheus
    ports:
      - 9090:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus-config.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - 3001:3000
    depends_on:
      - prom-server
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data: